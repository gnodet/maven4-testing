name: Close All Issues

on:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Close all open issues via GraphQL
        uses: actions/github-script@v8
        with:
          script: |
            let closed = 0;
            const BATCH_SIZE = 100; // close 100 issues per GraphQL request

            while (true) {
              // Fetch open issues via GraphQL (separate rate limit from REST)
              const query = `query($owner: String!, $name: String!) {
                repository(owner: $owner, name: $name) {
                  issues(states: OPEN, first: 100) {
                    totalCount
                    nodes { id number }
                  }
                }
              }`;

              const result = await github.graphql(query, {
                owner: context.repo.owner,
                name: context.repo.repo,
              });

              const issues = result.repository.issues.nodes;
              const remaining = result.repository.issues.totalCount;

              if (issues.length === 0) {
                console.log(`Done! Total closed: ${closed}`);
                break;
              }

              console.log(`${remaining} issues remaining...`);

              // Build a batched mutation to close all fetched issues in one call
              for (let i = 0; i < issues.length; i += BATCH_SIZE) {
                const batch = issues.slice(i, i + BATCH_SIZE);
                const mutations = batch.map((issue, idx) =>
                  `i${idx}: closeIssue(input: {issueId: "${issue.id}"}) { issue { number } }`
                ).join('\n');

                const mutation = `mutation { ${mutations} }`;

                try {
                  await github.graphql(mutation);
                  closed += batch.length;
                } catch (err) {
                  console.log(`Batch failed: ${err.message}`);
                  // Fall back to one-by-one for this batch
                  for (const issue of batch) {
                    try {
                      await github.graphql(`mutation { closeIssue(input: {issueId: "${issue.id}"}) { issue { number } } }`);
                      closed++;
                    } catch (e) {
                      console.log(`Failed to close #${issue.number}: ${e.message}`);
                    }
                  }
                }
              }

              console.log(`Closed ${closed} issues so far...`);
            }

            console.log(`\nAll done! Closed ${closed} issues total.`);
